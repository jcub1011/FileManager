name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore FileManager.slnx

      - name: Build
        run: dotnet build FileManager.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FileManager.slnx --configuration Release --no-build --verbosity normal
